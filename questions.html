<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question Bank • EE/VLSI Interview Prep</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="questions">
  <div class="bg-grid"></div>
  <header class="site-header sticky">
    <div class="brand"><div class="chip-icon"></div><div><h1>Question Bank</h1><p>Technical interview practice</p></div></div>
    <button class="menu-toggle" aria-label="Toggle navigation">☰</button>
    <nav class="site-nav">
      <a href="index.html">Home</a><a class="active" href="questions.html">Question Bank</a><a href="quiz.html">Quizzes</a><a href="mock.html">Mock</a><a href="flashcards.html">Flashcards</a><a href="notes.html">Notes</a><a href="behavioral.html">Behavioral</a><a href="companies.html">Companies</a><a href="projects.html">Projects</a>
    </nav>
  </header>
  <main class="container">
    <section class="card panel">
      <div class="section-head"><h2>Filter questions</h2><span class="pill" id="questionCount">0 results</span></div>
      <div class="filters">
        <select id="categoryFilter"></select>
        <select id="difficultyFilter">
          <option value="All">All difficulties</option>
          <option value="Easy">Easy</option>
          <option value="Medium">Medium</option>
          <option value="Hard">Hard</option>
        </select>
        <input type="text" id="questionSearch" placeholder="Search keywords like cache, FSM, op-amp, setup hold..." />
      </div>
    </section>
    <section id="questionsContainer" class="stack"></section>
  </main>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mock Tests</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="mock">
  <div class="bg-grid"></div>
  <header class="site-header sticky">
    <div class="brand"><div class="chip-icon"></div><div><h1>Mock Tests</h1><p>EE / VLSI / Hardware interview prep</p></div></div>
    <button class="menu-toggle" aria-label="Toggle navigation">☰</button>
    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="questions.html">Question Bank</a>
      <a href="quiz.html">Quizzes</a>
      <a class="active" href="mock.html">Mock</a>
      <a href="flashcards.html">Flashcards</a>
      <a href="notes.html">Notes</a>
      <a href="behavioral.html">Behavioral</a>
      <a href="companies.html">Companies</a>
      <a href="analytical.html">Analytical</a>
      <a href="videos.html">Videos</a>
      <a href="projects.html">Projects</a>
</nav>
  </header>
  <main class="container">
<section class="card panel stack">
  <div class="section-head"><h2>Mock interview paper</h2><span class="pill">click + submit</span></div>
  <div class="filters three">
    <select id="mockModeSelect">
      <option value="mixed">Mixed technical</option>
      <option value="verilog">Verilog</option>
      <option value="digital">Digital logic</option>
      <option value="analog">Analog design</option>
      <option value="behavioral">Behavioral</option>
    </select>
    <input id="mockQuestionCount" type="number" min="5" max="15" value="10" />
    <button class="btn btn-secondary" id="startMockBtn">Build paper</button>
    <button class="btn btn-primary" id="submitMockBtn">Submit mock</button>
  </div>
</section>
<section id="mockContainer" class="stack"></section>
<div id="mockResultCard" class="score-panel hidden"></div>
</main>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

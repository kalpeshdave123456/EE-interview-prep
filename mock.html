<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mock Interview • EE/VLSI Interview Prep</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="mock">
  <div class="bg-grid"></div>
  <header class="site-header sticky">
    <div class="brand"><div class="chip-icon"></div><div><h1>Mock Interview Mode</h1><p>Mixed technical and behavioral rounds</p></div></div>
    <button class="menu-toggle" aria-label="Toggle navigation">☰</button>
    <nav class="site-nav">
      <a href="index.html">Home</a><a href="questions.html">Question Bank</a><a href="quiz.html">Quizzes</a><a class="active" href="mock.html">Mock</a><a href="flashcards.html">Flashcards</a><a href="notes.html">Notes</a><a href="behavioral.html">Behavioral</a><a href="companies.html">Companies</a><a href="projects.html">Projects</a>
    </nav>
  </header>
  <main class="container">
    <section class="card panel">
      <div class="filters three">
        <select id="mockModeSelect">
          <option value="mixed">Mixed technical + behavioral</option>
          <option value="technical">Technical only</option>
          <option value="behavioral">Behavioral only</option>
          <option value="verilog">Verilog / RTL only</option>
          <option value="digital">Digital Logic only</option>
          <option value="analog">Analog Design only</option>
        </select>
        <input type="number" id="mockQuestionCount" min="3" max="15" value="6" />
        <button id="startMockBtn" class="btn btn-primary">Start mock</button>
      </div>
    </section>

    <section id="mockContainer" class="stack"></section>
  </main>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
